<html lang="nl">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #9a7010; --gold-lt: #7a5800; --gold-dk: #b88a18;
      --bg: #ffffff; --bg1: #f5f5f5; --bg2: #eeeeee; --bg3: #e4e4e4;
      --border: #d0d0d0; --border2: #bbbbbb;
      --text: #111111; --muted: #666666; --muted2: #999999;
      --green: #16a34a; --green-dk: #dcfce7;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── HEADER ─────────────────────────────────────────── */
    header { background: #000; border-bottom: 2px solid var(--gold); position: relative; overflow: hidden; }
    header::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 60% 120% at 50% -10%, #2a1e00 0%, transparent 70%); pointer-events:none; }
    .hdr-inner { display:flex; align-items:center; gap:18px; padding:10px 24px; max-width:1760px; margin:0 auto; position:relative; z-index:1; }
    .hdr-logo { color:var(--gold); flex-shrink:0; }
    .hdr-divider { width:1px; height:44px; background:var(--border2); flex-shrink:0; }
    .hdr-eyebrow { font-size:0.58rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--gold); }
    .hdr-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:2px; line-height:1; color:#fff; }
    .hdr-title span { color:var(--gold-lt); }
    .hdr-sub { font-size:0.62rem; color:var(--muted); margin-top:2px; }
    .hdr-trophy { margin-left:auto; font-size:2rem; }
    .save-badge { font-size:0.65rem; color:var(--green); background:var(--green-dk); padding:3px 8px; border-radius:99px; opacity:0; transition:opacity 0.4s; margin-left:10px; }
    .save-badge.show { opacity:1; }

    /* ── POSTER LAYOUT ──────────────────────────────────── */
    .poster { max-width:1760px; margin:0 auto; padding:14px 16px 32px; }
    .section-title {
      font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:3px;
      color:var(--gold); text-align:center; padding:8px 0 7px;
      border-bottom:1px solid var(--border); margin-bottom:10px;
    }

    /* ── CONTROLS ───────────────────────────────────────── */
    .ctrl-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .btn { padding:7px 15px; border-radius:5px; border:1px solid; font-size:0.73rem; font-weight:700; cursor:pointer; transition:all 0.15s; letter-spacing:0.5px; text-transform:uppercase; font-family:inherit; }
    .btn-go    { background:#0d2e18; border-color:var(--green); color:#86efac; }
    .btn-go:hover { background:var(--green); color:#000; }
    .btn-ghost { background:var(--bg1); border-color:var(--border2); color:var(--muted); }
    .btn-ghost:hover { background:var(--bg2); color:var(--text); }
    .btn-print { background:#0f1a10; border-color:var(--gold-dk); color:var(--gold-lt); }
    .btn-print:hover { background:var(--gold-dk); color:#fff; }

    /* ── GROUPS GRID ────────────────────────────────────── */
    .groups-row { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }

    .group-card { background:var(--bg1); border:1px solid var(--border); border-radius:7px; overflow:hidden; }
    .grp-hdr { background:#0a0a0a; padding:5px 9px; display:flex; align-items:center; gap:7px; border-bottom:1px solid var(--border); }
    .grp-letter { font-family:'Bebas Neue',sans-serif; font-size:1.05rem; color:var(--gold); }
    .grp-nations { font-size:0.54rem; color:var(--muted); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

    /* Standings table */
    .standings { width:100%; border-collapse:collapse; font-size:0.63rem; }
    .standings thead { background:#0a0a0a; }
    .standings th { padding:2px 3px; color:var(--muted); font-weight:600; text-align:center; border-bottom:1px solid var(--border); white-space:nowrap; }
    .standings th.tn { text-align:left; padding-left:6px; }
    .standings td { padding:2px 3px; text-align:center; border-top:1px solid #1a1a1a; }
    .standings td.tn { text-align:left; padding-left:6px; font-weight:600; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .standings td.pts { font-weight:800; }
    .standings .r1 td { color:#15803d; font-weight:700; }
    .standings .r2 td { color:#1d4ed8; font-weight:700; }
    .standings .r3 td { color:#c2410c; }
    .standings .r4 td { color:var(--muted2); }

    /* Fixtures */
    .fixtures { padding:5px 7px; display:flex; flex-direction:column; gap:3px; border-top:1px solid var(--border); }
    .fix-md { font-size:0.52rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted2); padding:3px 0 1px; }
    .fixture { display:flex; align-items:center; gap:3px; font-size:0.6rem; }
    .fix-team { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .fix-team.home { text-align:right; }
    .fix-score { display:flex; align-items:center; gap:2px; flex-shrink:0; }
    .score-inp {
      width:24px; height:19px; text-align:center;
      background:var(--bg3); border:1px solid var(--border2); border-radius:3px;
      color:var(--text); font-size:0.7rem; font-weight:700; font-family:inherit; padding:0;
      -moz-appearance:textfield;
    }
    .score-inp::-webkit-outer-spin-button,
    .score-inp::-webkit-inner-spin-button { -webkit-appearance:none; }
    .score-inp:focus { outline:none; border-color:var(--gold); background:var(--bg2); }
    .score-sep { color:var(--muted2); font-size:0.58rem; }

    /* ── BRACKET ────────────────────────────────────────── */
    .bracket-section { margin:14px 0 10px; }
    .bracket-outer { overflow-x:auto; padding-bottom:8px; }

    .bracket-labels { display:flex; align-items:center; min-width:1200px; padding:0 0 7px; }
    .hl { font-size:0.62rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; text-align:center; padding:4px 0; border-radius:3px; color:var(--gold); }
    .hl.left  { flex:4; background:var(--bg1); border:1px solid var(--border2); margin-right:3px; }
    .hl.right { flex:4; background:var(--bg1); border:1px solid var(--border2); margin-left:3px; }
    .hl.center{ flex:1.2; background:#fef9ec; border:1px solid var(--gold-dk); color:var(--gold-lt); }

    .bracket-inner { display:flex; align-items:flex-start; min-width:1200px; }
    .rd-col { display:flex; flex-direction:column; align-items:center; width:110px; flex-shrink:0; }
    .rd-label { font-size:0.56rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:5px; text-align:center; white-space:nowrap; }
    .rd-matches { display:flex; flex-direction:column; width:102px; }
    .center-col { display:flex; flex-direction:column; align-items:center; width:118px; flex-shrink:0; }
    .center-col .rd-label { color:var(--gold); }
    .conn { width:8px; flex-shrink:0; }

    /* Match box */
    .b-match { background:var(--bg2); border:1px solid var(--border); border-radius:5px; overflow:hidden; width:102px; }
    .b-hdr { padding:2px 5px; background:var(--bg1); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .b-num { font-size:0.5rem; font-weight:800; color:var(--gold); }
    .b-meta { font-size:0.46rem; color:var(--muted2); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:64px; }
    .b-slot { padding:3px 6px; font-size:0.65rem; cursor:pointer; transition:background 0.12s; border-top:1px solid var(--border); display:flex; align-items:center; gap:3px; min-height:22px; }
    .b-slot:hover { background:var(--bg3); }
    .b-slot.win  { background:#dcfce7; color:#15803d; font-weight:700; }
    .b-slot.lose { color:var(--muted2); }
    .b-slot.tbd  { color:var(--muted2); font-style:italic; font-size:0.58rem; pointer-events:none; }
    .g-tag { font-size:0.48rem; padding:1px 3px; border-radius:2px; background:var(--bg3); color:var(--gold); font-weight:800; flex-shrink:0; border:1px solid var(--border2); }

    .third-section { margin-top:12px; text-align:center; }
    .third-label { font-size:0.54rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:4px; }
    .champ-section { margin-top:12px; text-align:center; }
    .champ-icon { font-size:1.3rem; }
    .champ-lbl { font-size:0.54rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold); margin:3px 0; }
    .champ-name { font-size:0.88rem; font-weight:800; color:var(--gold-lt); min-height:20px; word-break:break-word; background:#fef9ec; padding:2px 4px; border-radius:3px; }

    /* ── PRINT ──────────────────────────────────────────── */
    @media print {
      @page { size: A2 landscape; margin: 7mm; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background:#fff !important; color:#111 !important; font-size:6.5pt; }
      .ctrl-bar, .save-badge { display:none !important; }
      .poster { padding:0; max-width:100%; }
      .bracket-outer { overflow:visible; }
      .bracket-labels, .bracket-inner { min-width:0; }
      .score-inp { border:0.5pt solid var(--border2) !important; }
      .group-card { break-inside:avoid; }
      header::before { display:none; }
    }
  </style>
</head>

  99:  { round:'qf',  homeKey:'W91', awayKey:'W92', feeds:{m:102,s:'home'}, date:'11/7', venue:'Dallas'       },
  100: { round:'qf',  homeKey:'W95', awayKey:'W96', feeds:{m:102,s:'away'}, date:'12/7', venue:'Seattle'      },
  101: { round:'sf',  homeKey:'W97', awayKey:'W98',  feeds:{m:104,s:'home'}, loserFeeds:{m:103,s:'home'}, date:'14/7', venue:'Dallas'      },
  102: { round:'sf',  homeKey:'W99', awayKey:'W100', feeds:{m:104,s:'away'}, loserFeeds:{m:103,s:'away'}, date:'15/7', venue:'Atlanta'     },
  103: { round:'3rd', homeKey:'L101',awayKey:'L102', feeds:null, date:'18/7', venue:'Miami'       },
  104: { round:'final',homeKey:'W101',awayKey:'W102',feeds:null, date:'19/7', venue:'New York/NJ' },
};

const THIRD_SLOTS = {
  74:['A','B','C','D','F'], 77:['C','D','F','G','H'],
  79:['C','E','F','H','I'], 80:['E','H','I','J','K'],
  81:['B','E','F','I','J'], 82:['A','E','H','I','J'],
  85:['E','F','G','I','J'], 87:['D','E','I','J','L'],
};

const L32=[74,77,73,75,83,84,81,82], L16=[89,90,93,94], LQF=[97,98], LSF=[101];
const R32=[76,78,79,80,86,88,85,87], R16=[91,92,95,96], RQF=[99,100], RSF=[102];

const SP = {
  r32: { gap:6,   pt:0   },
  r16: { gap:72,  pt:33  },
  qf:  { gap:204, pt:99  },
  sf:  { pt:231          }
};

/* ═══════════ STATE ══════════════════════════════════════════════════ */
let STATE = { scores:{}, bracket:{} };

function load() {
  try {
    const d = localStorage.getItem('wc26poster_v2');
    if (d) STATE = JSON.parse(d);
    else STATE.scores = JSON.parse(JSON.stringify(DEFAULT_SCORES));
  } catch(e) { STATE.scores = JSON.parse(JSON.stringify(DEFAULT_SCORES)); }
}
function save() {
  try { localStorage.setItem('wc26poster_v2', JSON.stringify(STATE)); } catch(e){}
  const b = document.getElementById('saveBadge');
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), 1500);
}

/* ═══════════ GROUPS ═════════════════════════════════════════════════ */
function calcStandings(grp) {
  const teams = GROUPS[grp];
  const s = teams.map(t => ({ t, pts:0, w:0, d:0, l:0, gf:0, ga:0, mp:0 }));
  GROUP_FIXTURES[grp].forEach(([hi, ai], fi) => {
    const sc = STATE.scores[grp]?.[fi];
    if (!sc || sc.h === '' || sc.a === '') return;
    const h = parseInt(sc.h), a = parseInt(sc.a);
    if (isNaN(h) || isNaN(a)) return;
    s[hi].mp++; s[ai].mp++;
    s[hi].gf += h; s[hi].ga += a;
    s[ai].gf += a; s[ai].ga += h;
    if (h > a)      { s[hi].pts += 3; s[hi].w++; s[ai].l++; }
    else if (h < a) { s[ai].pts += 3; s[ai].w++; s[hi].l++; }
    else            { s[hi].pts++; s[hi].d++; s[ai].pts++; s[ai].d++; }
  });
  s.forEach(x => x.gd = x.gf - x.ga);
  return [...s].sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.t.localeCompare(b.t));
}

function renderGroup(grp) {
  const teams = GROUPS[grp];
  const std = calcStandings(grp);
  const rc = ['r1','r2','r3','r4'];

  const standRows = std.map((row, i) =>
    `<tr class="${rc[i]}">
      <td class="tn">${row.t}</td>
      <td>${row.w}</td><td>${row.d}</td><td>${row.l}</td>
      <td class="pts">${row.pts}</td>
      <td>${row.gd > 0 ? '+'+row.gd : row.gd}</td>
    </tr>`
  ).join('');

  const fixRows = GROUP_FIXTURES[grp].map(([hi, ai, date, time, venue], fi) => {
    const sc = STATE.scores[grp]?.[fi] || {};
    const mdNum = Math.floor(fi/2) + 1;
    const mdLabel = fi % 2 === 0
      ? `<div class="fix-md">Speeldag ${mdNum} · ${date}</div>` : '';
    return `${mdLabel}<div class="fixture" title="${venue} · ${time}">
      <span class="fix-team home">${teams[hi]}</span>
      <div class="fix-score">
        <input class="score-inp" type="number" min="0" max="99"
          value="${sc.h ?? ''}" placeholder="–"
          data-grp="${grp}" data-fi="${fi}" data-side="h">
        <span class="score-sep">–</span>
        <input class="score-inp" type="number" min="0" max="99"
          value="${sc.a ?? ''}" placeholder="–"
          data-grp="${grp}" data-fi="${fi}" data-side="a">
      </div>
      <span class="fix-team">${teams[ai]}</span>
    </div>`;
  }).join('');

  return `<div class="group-card" id="grp-${grp}">
    <div class="grp-hdr">
      <span class="grp-letter">Groep ${grp}</span>
      <span class="grp-nations">${teams.join(' · ')}</span>
    </div>
    <table class="standings">
      <thead><tr>
        <th class="tn">Team</th><th>W</th><th>G</th><th>V</th><th>Ptn</th><th>Sld</th>
      </tr></thead>
      <tbody id="std-${grp}">${standRows}</tbody>
    </table>
    <div class="fixtures">${fixRows}</div>
  </div>`;
}

function renderGroups() {
  const letters = Object.keys(GROUPS);
  document.getElementById('topGroups').innerHTML  = letters.slice(0,6).map(renderGroup).join('');
  document.getElementById('bottomGroups').innerHTML = letters.slice(6).map(renderGroup).join('');
}

function updateStandings(grp) {
  const std = calcStandings(grp);
  const rc = ['r1','r2','r3','r4'];
  const tbody = document.getElementById('std-'+grp);
  if (!tbody) return;
  tbody.innerHTML = std.map((row, i) =>
    `<tr class="${rc[i]}">
      <td class="tn">${row.t}</td>
      <td>${row.w}</td><td>${row.d}</td><td>${row.l}</td>
      <td class="pts">${row.pts}</td>
      <td>${row.gd > 0 ? '+'+row.gd : row.gd}</td>
    </tr>`
  ).join('');
}

document.addEventListener('input', e => {
  const inp = e.target;
  if (!inp.classList.contains('score-inp')) return;
  const { grp, fi, side } = inp.dataset;
  if (!STATE.scores[grp]) STATE.scores[grp] = {};
  if (!STATE.scores[grp][fi]) STATE.scores[grp][fi] = {};
  STATE.scores[grp][fi][side] = inp.value;
  save();
  updateStandings(grp);
});

/* ═══════════ BRACKET ════════════════════════════════════════════════ */
function makeMatchBox(mid) {
  const m = MATCHES[mid];
  const bs = STATE.bracket[mid] || {};
  const hTeam = bs.home || '', aTeam = bs.away || '', winner = bs.winner || '';
  const hClass = hTeam ? (winner === hTeam ? 'win' : winner ? 'lose' : '') : 'tbd';
  const aClass = aTeam ? (winner === aTeam ? 'win' : winner ? 'lose' : '') : 'tbd';
  return `<div class="b-match" id="bm-${mid}">
    <div class="b-hdr">
      <span class="b-num">#${mid}</span>
      <span class="b-meta">${m.date} · ${m.venue}</span>
    </div>
    <div class="b-slot ${hClass}" data-mid="${mid}" data-side="home">
      ${hTeam ? `<span class="g-tag">${m.homeKey.slice(0,2)}</span>${hTeam}` : m.homeKey}
    </div>
    <div class="b-slot ${aClass}" data-mid="${mid}" data-side="away">
      ${aTeam ? `<span class="g-tag">${m.awayKey.slice(0,2)}</span>${aTeam}` : m.awayKey}
    </div>
  </div>`;
}

function makeColumn(ids, spKey, label) {
  const sp = SP[spKey] || {};
  return `<div class="rd-col">
    <div class="rd-label">${label}</div>
    <div class="rd-matches" style="gap:${sp.gap||6}px;padding-top:${sp.pt||0}px;display:flex;flex-direction:column;">
      ${ids.map(makeMatchBox).join('')}
    </div>
  </div>`;
}

function makeSFCol(id, label) {
  return `<div class="rd-col">
    <div class="rd-label">${label}</div>
    <div class="rd-matches" style="padding-top:${SP.sf.pt}px;display:flex;flex-direction:column;">
      ${makeMatchBox(id)}
    </div>
  </div>`;
}

function makeCenterCol() {
  const champ = STATE.bracket[104]?.winner || '';
  return `<div class="center-col">
    <div class="rd-label">Finale</div>
    <div style="padding-top:${SP.sf.pt}px;">
      ${makeMatchBox(104)}
      <div class="third-section">
        <div class="third-label">3e / 4e Plaats — #103 · 18/7 · Miami</div>
        ${makeMatchBox(103)}
      </div>
      <div class="champ-section">
        <div class="champ-icon">🏆</div>
        <div class="champ-lbl">Wereldkampioen</div>
        <div class="champ-name">${champ || '—'}</div>
      </div>
    </div>
  </div>`;
}

function renderBracket() {
  document.getElementById('bracketOuter').innerHTML = `
    <div class="bracket-labels">
      <div class="hl left">◄ Linker Helft — SF #101 (Dallas, 14 jul)</div>
      <div class="hl center">Finale #104<br><small style="font-size:0.5rem;color:#a38000">NY/NJ · 19 jul</small></div>
      <div class="hl right">SF #102 (Atlanta, 15 jul) — Rechter Helft ►</div>
    </div>
    <div class="bracket-inner">
      ${makeColumn(L32,'r32','Laatste 32')}
      <div class="conn"></div>
      ${makeColumn(L16,'r16','Laatste 16')}
      <div class="conn"></div>
      ${makeColumn(LQF,'qf','Kwartfinale')}
      <div class="conn"></div>
      ${makeSFCol(101,'Halve Finale')}
      <div class="conn"></div>
      ${makeCenterCol()}
      <div class="conn"></div>
      ${makeSFCol(102,'Halve Finale')}
      <div class="conn"></div>
      ${makeColumn(RQF,'qf','Kwartfinale')}
      <div class="conn"></div>
      ${makeColumn(R16,'r16','Laatste 16')}
      <div class="conn"></div>
      ${makeColumn(R32,'r32','Laatste 32')}
    </div>`;
}

document.addEventListener('click', e => {
  const slot = e.target.closest('.b-slot');
  if (!slot || slot.classList.contains('tbd')) return;
  const mid = +slot.dataset.mid;
  const side = slot.dataset.side;
  const bs = STATE.bracket[mid] || {};
  const team = side === 'home' ? bs.home : bs.away;
  if (team) advance(mid, team);
});

function advance(mid, team) {
  const bs = STATE.bracket[mid] || {};
  const m = MATCHES[mid];
  const prevWin = bs.winner;
  if (prevWin === team) {
    STATE.bracket[mid] = { ...bs, winner: null };
    if (m.feeds)      clearDown(m.feeds.m, m.feeds.s, team);
    if (m.loserFeeds) clearDown(m.loserFeeds.m, m.loserFeeds.s, null);
  } else {
    const loser = team === bs.home ? bs.away : bs.home;
    if (prevWin && prevWin !== team && m.feeds) clearDown(m.feeds.m, m.feeds.s, prevWin);
    STATE.bracket[mid] = { ...bs, winner: team };
    if (m.feeds)      setDown(m.feeds.m, m.feeds.s, team);
    if (m.loserFeeds && loser) setDown(m.loserFeeds.m, m.loserFeeds.s, loser);
  }
  save();
  renderBracket();
}

function clearDown(mid, side, team) {
  if (!mid) return;
  const bs = STATE.bracket[mid] || {};
  STATE.bracket[mid] = { ...bs, [side]: null };
  if (bs.winner && (bs.winner === team || team === null)) {
    const m = MATCHES[mid];
    STATE.bracket[mid].winner = null;
    if (m.feeds)      clearDown(m.feeds.m, m.feeds.s, bs.winner);
    if (m.loserFeeds) clearDown(m.loserFeeds.m, m.loserFeeds.s, null);
  }
}

function setDown(mid, side, team) {
  if (!mid) return;
  const bs = STATE.bracket[mid] || {};
  const prev = bs[side];
  if (prev && prev !== team && bs.winner === prev) {
    const m = MATCHES[mid];
    STATE.bracket[mid] = { ...bs, [side]: team, winner: null };
    if (m.feeds)      clearDown(m.feeds.m, m.feeds.s, prev);
    if (m.loserFeeds) clearDown(m.loserFeeds.m, m.loserFeeds.s, null);
  } else {
    STATE.bracket[mid] = { ...bs, [side]: team };
  }
}

/* ═══════════ POPULATE BRACKET FROM GROUPS ═══════════════════════════ */
function populateBracket() {
  const pos = {};
  const grpOf = {};
  Object.keys(GROUPS).forEach(grp => {
    const std = calcStandings(grp);
    pos['1'+grp] = std[0]?.t || '';
    pos['2'+grp] = std[1]?.t || '';
    pos['3'+grp] = std[2]?.t || '';
    if (std[2]) grpOf[std[2].t] = grp;
  });
  const thirds = Object.keys(GROUPS).map(g => pos['3'+g]).filter(Boolean);
  const assigned = assignThirds(thirds, grpOf);
  [73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88].forEach(mid => {
    const m = MATCHES[mid];
    const bs = STATE.bracket[mid] || {};
    const parse = k => {
      if (k.startsWith('W') || k.startsWith('L')) return null;
      if (k.startsWith('3rd')) return assigned[mid] || '';
      return pos[k] || '';
    };
    STATE.bracket[mid] = { ...bs, home: parse(m.homeKey), away: parse(m.awayKey) };
  });
  save();
  renderBracket();
}

function assignThirds(teamList, grpOf) {
  const slots = [74,77,79,80,81,82,85,87];
  const result = {}, used = new Set();
  slots.forEach(slotId => {
    const allowed = THIRD_SLOTS[slotId];
    const pick = teamList.find(t => !used.has(t) && allowed.includes(grpOf[t]));
    if (pick) { result[slotId] = pick; used.add(pick); }
  });
  return result;
}

function clearBracket() {
  STATE.bracket = {};
  save();
  renderBracket();
}

function resetAll() {
  if (!confirm('Alles resetten? Alle scores en bracket worden gewist.')) return;
  STATE = { scores: JSON.parse(JSON.stringify(DEFAULT_SCORES)), bracket:{} };
  save();
  renderGroups();
  renderBracket();
}

/* ═══════════ INIT ═══════════════════════════════════════════════════ */
load();
renderGroups();
renderBracket();
</script>
